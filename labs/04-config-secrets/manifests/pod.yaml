apiVersion: v1
kind: Pod
metadata:
  name: config-pod
  labels:
    app: config-demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "20m"
          memory: "32Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
      env:
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_MODE
        - name: APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: APP_TOKEN
