apiVersion: v1
kind: Pod
metadata:
  name: storage-pod
  labels:
    app: storage-demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "20m"
          memory: "32Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: app-pvc
