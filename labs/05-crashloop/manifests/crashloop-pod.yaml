apiVersion: v1
kind: Pod
metadata:
  name: crash-pod
  labels:
    app: crash-demo
spec:
  restartPolicy: Always
  containers:
    - name: crash
      image: busybox:1.36
      command: ["sh", "-c", "echo Starting && exit 1"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
