apiVersion: v1
kind: Pod
metadata:
  name: web-pod
  labels:
    app: web
    tier: frontend
  annotations:
    owner: "labs"
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
      ports:
        - containerPort: 80
